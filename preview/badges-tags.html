<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  .tag { display: inline-flex; align-items: center; padding: 6px 14px; border: 1px solid var(--border-color-light); border-radius: 50px; font-size: 12px; color: var(--font-color); font-weight: 500; cursor: pointer; transition: all .25s; }
  .tag:hover { background: var(--primary-color); color: white; border-color: var(--primary-color); }
  .tag.active { background: var(--primary-color); color: white; border-color: var(--primary-color); }
  .badge { padding: 4px 10px; border-radius: 4px; font-size: 11px; font-weight: 700; letter-spacing: .5px; }
  .badge-primary { background: rgba(10,166,151,.12); color: var(--primary-color); }
  .badge-papaya { background: rgba(255,128,0,.15); color: #c25a00; }
  .badge-trophy { background: var(--accent-yellow); color: #5a4400; }
</style></head>
<body><div class="card-frame">
  <div class="row"><span class="tag active">All</span><span class="tag">Embedded</span><span class="tag">Hacking</span><span class="tag">F1</span><span class="tag">Side Projects</span></div>
  <div class="row" style="gap: 8px"><span class="badge badge-primary">NEW</span><span class="badge badge-papaya">FEATURED</span><span class="badge badge-trophy">🏆 1st place</span></div>
</div></body></html>
