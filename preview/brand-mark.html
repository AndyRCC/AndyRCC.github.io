<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  .wrap { display: flex; gap: 24px; align-items: center; }
  .seal { width: 90px; height: 90px; background: white; border: 1px solid var(--border-color-light); border-radius: 16px; display: grid; place-items: center; }
  .seal img { width: 60%; height: 60%; object-fit: contain; }
  .brand { font-family: 'Dosis', var(--font-sans); font-size: 32px; font-weight: 800; letter-spacing: .5px; color: var(--heading-color); }
  .brand .accent { color: var(--accent-papaya); }
  .meta { font-family: var(--font-mono); font-size: 11px; color: var(--font-color-soft); }
</style></head>
<body><div class="card-frame">
  <div class="wrap">
    <div class="seal"><img src="../assets/mclaren.png" alt="McLaren mark"></div>
    <div class="col" style="gap: 4px">
      <div class="brand">Andy<span class="accent">.</span>Casafranca</div>
      <div class="meta">Dosis 800 · McLaren papaya dot · personal seal = mclaren.png</div>
    </div>
  </div>
</div></body></html>
