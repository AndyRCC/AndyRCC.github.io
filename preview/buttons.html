<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  .btn { font-family: var(--font-sans); font-size: 14px; font-weight: 600; padding: 12px 28px; border-radius: 50px; border: 1.5px solid transparent; cursor: pointer; transition: all .3s ease; }
  .btn-primary { background: var(--primary-color); color: white; }
  .btn-primary:hover { background: var(--primary-color-hover); }
  .btn-outline { background: transparent; color: var(--primary-color); border-color: var(--primary-color); }
  .btn-outline:hover { background: var(--primary-color); color: white; }
  .btn-shock { background: var(--accent-papaya); color: #0c1116; border: 2px solid #0c1116; box-shadow: 6px 6px 0 #0c1116; font-weight: 700; }
  .btn-shock:hover { transform: translate(2px, 2px); box-shadow: 4px 4px 0 #0c1116; }
  .btn-ghost { background: var(--bg-lightgrey); color: var(--heading-color); }
</style></head>
<body><div class="card-frame">
  <div class="row" style="gap: 16px"><button class="btn btn-primary">Contact Me</button><button class="btn btn-outline">Read More</button><button class="btn btn-ghost">Cancel</button><button class="btn btn-shock">SHOCK MODE</button></div>
  <div class="row mono">.btn-primary · .btn-outline · .btn-ghost · .btn-shock (papaya + crisp shadow)</div>
</div></body></html>
