<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  .grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 14px; }
  .card { background: white; border: 1px solid var(--border-color-light); border-radius: 12px; padding: 18px; box-shadow: 0 4px 12px rgba(15,22,30,.04); }
  .card .ico { width: 36px; height: 36px; border-radius: 10px; background: rgba(10,166,151,.1); color: var(--primary-color); display: grid; place-items: center; margin-bottom: 10px; font-size: 16px; font-weight: 800; font-family: var(--font-mono);}
  .card h5 { font-size: 14px; margin: 0 0 4px; }
  .card p { font-size: 12px; margin: 0; color: var(--font-color-soft); line-height: 1.5; }
</style></head>
<body><div class="card-frame">
  <div class="grid">
    <div class="card"><div class="ico">{ }</div><h5>Ethical Hacking</h5><p>Penetration testing &amp; secure-by-design audits.</p></div>
    <div class="card"><div class="ico">µC</div><h5>Embedded Systems</h5><p>Microcontrollers, sensors &amp; control loops.</p></div>
    <div class="card"><div class="ico">⚙</div><h5>Bioengineering</h5><p>Biomedical instrumentation &amp; signal pipelines.</p></div>
  </div>
</div></body></html>
