<!doctype html><html data-theme="dark"><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  body { background: #0e1419; }
  .grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 8px; }
  .swatch { aspect-ratio: 1; border-radius: 10px; display: flex; flex-direction: column; justify-content: flex-end; padding: 8px; box-sizing: border-box; font-size: 10px; color: #f5f7f8; border: 1px solid #232a31; }
  .swatch .name { font-weight: 700; }
  .swatch .hex { font-family: var(--font-mono); opacity: .8; }
</style></head>
<body><div class="card-frame">
  <div class="grid">
    <div class="swatch" style="background:#0e1419"><div class="name">bg</div><div class="hex">#0e1419</div></div>
    <div class="swatch" style="background:#161c22"><div class="name">bg-grey</div><div class="hex">#161c22</div></div>
    <div class="swatch" style="background:#1d242b"><div class="name">bg-light</div><div class="hex">#1d242b</div></div>
    <div class="swatch" style="background:#232a31"><div class="name">border</div><div class="hex">#232a31</div></div>
    <div class="swatch" style="background:#0aa697"><div class="name">primary</div><div class="hex">#0aa697</div></div>
    <div class="swatch" style="background:#ff8000"><div class="name">papaya</div><div class="hex">#ff8000</div></div>
  </div>
</div></body></html>
