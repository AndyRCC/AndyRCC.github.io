<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  .swatch { width: 100%; aspect-ratio: 1; border-radius: 12px; display: flex; flex-direction: column; justify-content: flex-end; padding: 12px; box-sizing: border-box; color: white; box-shadow: var(--shadow-sm); }
  .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; }
  .swatch .name { font-size: 13px; font-weight: 700; letter-spacing: .3px; }
  .swatch .hex { font-family: var(--font-mono); font-size: 11px; opacity: .85; }
</style></head>
<body><div class="card-frame">
  <div class="grid">
    <div class="swatch" style="background:#0aa697"><div class="name">Primary</div><div class="hex">#0aa697</div></div>
    <div class="swatch" style="background:#025b4d"><div class="name">Primary Hover</div><div class="hex">#025b4d</div></div>
    <div class="swatch" style="background:#e6f6f4;color:#025b4d"><div class="name">Primary Soft</div><div class="hex">#e6f6f4</div></div>
    <div class="swatch" style="background:#ff8000"><div class="name">Papaya</div><div class="hex">#ff8000</div></div>
    <div class="swatch" style="background:#ffc107;color:#212529"><div class="name">F1 Yellow</div><div class="hex">#ffc107</div></div>
  </div>
</div></body></html>
