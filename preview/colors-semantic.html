<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  .row-item { flex: 1; display: flex; gap: 10px; align-items: center; padding: 10px 12px; border: 1px solid var(--border-color-light); border-radius: 10px; }
  .dot { width: 28px; height: 28px; border-radius: 8px; flex: 0 0 auto; }
  .vname { font-family: var(--font-mono); font-size: 12px; color: var(--heading-color); }
  .desc { font-size: 11px; color: var(--font-color-soft); }
</style></head>
<body><div class="card-frame">
  <div class="row" style="gap: 10px">
    <div class="row-item"><div class="dot" style="background:#0aa697"></div><div class="col"><div class="vname">--primary-color</div><div class="desc">links, CTA, focus</div></div></div>
    <div class="row-item"><div class="dot" style="background:#dc3545"></div><div class="col"><div class="vname">--accent-red</div><div class="desc">danger, errors</div></div></div>
    <div class="row-item"><div class="dot" style="background:#ffc107"></div><div class="col"><div class="vname">--accent-yellow</div><div class="desc">F1 highlight, warning</div></div></div>
  </div>
  <div class="row" style="gap: 10px">
    <div class="row-item"><div class="dot" style="background:#0c1116"></div><div class="col"><div class="vname">--heading-color</div><div class="desc">all h1–h6</div></div></div>
    <div class="row-item"><div class="dot" style="background:#404040"></div><div class="col"><div class="vname">--font-color</div><div class="desc">body copy</div></div></div>
    <div class="row-item"><div class="dot" style="background:#6c757d"></div><div class="col"><div class="vname">--font-color-soft</div><div class="desc">muted, captions</div></div></div>
  </div>
</div></body></html>
