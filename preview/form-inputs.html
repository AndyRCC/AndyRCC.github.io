<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  .field { display: flex; flex-direction: column; gap: 4px; }
  label { font-size: 12px; color: var(--heading-color); font-weight: 600; }
  input, textarea { font-family: var(--font-sans); font-size: 14px; padding: 12px 14px; border: 1px solid var(--border-color-light); border-radius: 8px; background: white; color: var(--font-color); outline: none; transition: border-color .25s; }
  input:focus { border-color: var(--primary-color); box-shadow: 0 0 0 3px rgba(10, 166, 151, 0.15); }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
</style></head>
<body><div class="card-frame">
  <div class="grid">
    <div class="field"><label>Name</label><input value="Andy Casafranca"></div>
    <div class="field"><label>Email</label><input value="andy@example.com"></div>
    <div class="field" style="grid-column: span 2"><label>Message</label><input placeholder="Tell me about your project..."></div>
  </div>
</div></body></html>
