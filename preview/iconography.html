<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
  .grid { display: grid; grid-template-columns: repeat(8, 1fr); gap: 12px; }
  .ico { aspect-ratio: 1; border: 1px solid var(--border-color-light); border-radius: 10px; display: grid; place-items: center; font-size: 22px; color: var(--heading-color); position: relative; transition: all .25s; }
  .ico:hover { color: var(--primary-color); border-color: var(--primary-color); transform: translateY(-2px); }
  .ico .lbl { position: absolute; bottom: 4px; font-size: 8px; font-family: var(--font-mono); color: var(--font-color-soft); }
</style></head>
<body><div class="card-frame">
  <div class="grid">
    <div class="ico"><i class="fa-solid fa-code"></i><span class="lbl">code</span></div>
    <div class="ico"><i class="fa-solid fa-microchip"></i><span class="lbl">chip</span></div>
    <div class="ico"><i class="fa-solid fa-brain"></i><span class="lbl">brain</span></div>
    <div class="ico"><i class="fa-solid fa-bolt"></i><span class="lbl">bolt</span></div>
    <div class="ico"><i class="fa-brands fa-linkedin-in"></i><span class="lbl">li</span></div>
    <div class="ico"><i class="fa-brands fa-instagram"></i><span class="lbl">ig</span></div>
    <div class="ico"><i class="fa-brands fa-github"></i><span class="lbl">gh</span></div>
    <div class="ico"><i class="fa-brands fa-steam"></i><span class="lbl">steam</span></div>
  </div>
</div></body></html>
