<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; }
  .demo { aspect-ratio: 1.5; background: var(--primary-color); display: flex; align-items: flex-end; padding: 10px; color: white; font-family: var(--font-mono); font-size: 11px; }
</style></head>
<body><div class="card-frame">
  <div class="grid">
    <div class="demo" style="border-radius: 4px">4px / sm</div>
    <div class="demo" style="border-radius: 8px">8px / default</div>
    <div class="demo" style="border-radius: 16px">16px / card</div>
    <div class="demo" style="border-radius: 50px">50px / pill</div>
  </div>
</div></body></html>
