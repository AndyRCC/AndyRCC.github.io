<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 24px; padding: 18px 8px 8px; }
  .demo { aspect-ratio: 1.4; background: white; border: 1px solid var(--border-color-light); border-radius: 10px; display: flex; align-items: flex-end; padding: 10px; font-family: var(--font-mono); font-size: 10px; color: var(--font-color-soft); }
</style></head>
<body><div class="card-frame">
  <div class="grid">
    <div class="demo" style="box-shadow: 0 4px 12px rgba(15,22,30,.06)">sm</div>
    <div class="demo" style="box-shadow: 0 12px 32px rgba(15,22,30,.10)">md</div>
    <div class="demo" style="box-shadow: 0 25px 98px rgba(19,19,19,.08)">lg / pagination</div>
    <div class="demo" style="box-shadow: 6px 6px 0 #000">crisp / shock</div>
  </div>
</div></body></html>
