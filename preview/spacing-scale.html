<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  .bar { display: flex; align-items: center; gap: 12px; }
  .block { background: var(--primary-color); height: 14px; border-radius: 4px; }
  .name { font-family: var(--font-mono); font-size: 11px; color: var(--font-color-soft); width: 70px; }
  .px { font-family: var(--font-mono); font-size: 11px; color: var(--heading-color); width: 60px; text-align: right; }
</style></head>
<body><div class="card-frame">
  <div class="col" style="gap: 8px">
    <div class="bar"><span class="name">--space-1</span><div class="block" style="width: 7px"></div><span class="px">7px</span></div>
    <div class="bar"><span class="name">--space-2</span><div class="block" style="width: 11px"></div><span class="px">11px</span></div>
    <div class="bar"><span class="name">--space-3</span><div class="block" style="width: 16px"></div><span class="px">16px</span></div>
    <div class="bar"><span class="name">--space-4</span><div class="block" style="width: 24px"></div><span class="px">24px</span></div>
    <div class="bar"><span class="name">--space-5</span><div class="block" style="width: 36px"></div><span class="px">36px</span></div>
    <div class="bar"><span class="name">--space-6</span><div class="block" style="width: 54px"></div><span class="px">54px</span></div>
    <div class="bar"><span class="name">--space-7</span><div class="block" style="width: 81px"></div><span class="px">81px</span></div>
  </div>
</div></body></html>
