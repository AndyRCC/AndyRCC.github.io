<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  .row-h { display: flex; align-items: baseline; gap: 16px; padding: 8px 0; border-bottom: 1px dashed var(--border-color-light); }
  .row-h:last-child { border: 0; }
  .tag { font-family: var(--font-mono); font-size: 11px; color: var(--font-color-soft); width: 32px; }
  .size { font-family: var(--font-mono); font-size: 11px; color: var(--font-color-soft); margin-left: auto; }
</style></head>
<body><div class="card-frame">
  <div class="row-h"><span class="tag">h1</span><span style="font-size: 36px; font-weight: 700; color: var(--heading-color)">Display headline</span><span class="size">≥36px / clamp</span></div>
  <div class="row-h"><span class="tag">h2</span><span style="font-size: 32px; font-weight: 700; color: var(--heading-color)">Section title</span><span class="size">28–40px</span></div>
  <div class="row-h"><span class="tag">h3</span><span style="font-size: 24px; font-weight: 700; color: var(--heading-color)">Subsection</span><span class="size">24px</span></div>
  <div class="row-h"><span class="tag">h4</span><span style="font-size: 20px; font-weight: 700; color: var(--heading-color)">Card title</span><span class="size">20px</span></div>
</div></body></html>
